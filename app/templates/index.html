<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAPM</title>

    <link rel="stylesheet"
          href="{{ request.url_for('static', path='CSS/index.css') }}">
</head>

<body>

<section class="hero">

    <div class="bg-circle top"></div>
    <div class="bg-circle bottom"></div>

    <div class="container">

        <!-- LEFT -->
        <div class="hero-left">

            <div class="logo">

                <img src="{{ request.url_for('static', path='IMG/logo.png') }}"
                     class="logo-img"
                     alt="Logo AAPM">

                <h1>AAPM</h1>

            </div>

            <div class="dots"></div>

            <h2>
                BEM VINDO <br>
                A AAPM!
            </h2>

            <p>
                O melhor para seus estudos
                <strong>começa aqui!</strong>
            </p>

            <a href="/auth/login" class="btn-login">ENTRAR</a>

            <div class="infos">

                <div class="info-item">
                    <span>📖</span>
                    <p>Material de qualidade</p>
                </div>

                <div class="info-item">
                    <span>👥</span>
                    <p>Feito para estudantes</p>
                </div>

                <div class="info-item">
                    <span>🎯</span>
                    <p>Foco no seu futuro</p>
                </div>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="hero-right">

            <img src="{{ request.url_for('static', path='IMG/camisa.png') }}"
                 class="camiseta"
                 alt="Camiseta">

            <div class="senai-card">

                <img src="{{ request.url_for('static', path='IMG/card.png') }}"
                     alt="Card SENAI">

            </div>

            <div class="sobre-card">

                <h3>SOBRE A AAPM</h3>

                <p>
                    A AAPM existe para apoiar seu aprendizado,
                    oferecendo materiais selecionados e soluções
                    que fazem a diferença no seu dia a dia.
                </p>

            </div>

        </div>

    </div>

</section>

<script src="{{ request.url_for('static', path='JS/index.js') }}"></script>

</body>
</html>
