<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AAPM SENAI{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <span>AAPM - Francisco Matarazzo</span>
        </div>
        <ul class="nav-links">
            <li><a href="/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/usuarios"><i class="fa-solid fa-users-gear"></i> Gerenciar Usuários</a></li>
            <li><a href="/logout" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></li>
        </ul>
    </nav>

    <main class="main-container">
        {% block conteudo %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 AAPM SENAI - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
