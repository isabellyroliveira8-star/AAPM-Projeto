<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>


<!-- CSS -->
<link rel="stylesheet" href="/app/static/CSS/admin_usuarios.css">


</head>

<body>


<!-- MENU -->

<aside class="sidebar">

    <h2>PDV AAPM</h2>

    <nav>

        <a href="#">
            Dashboard
        </a>

        <a href="#" class="ativo">
            Usuários
        </a>

        <a href="/produtos">
            Produtos
        </a>

        <a href="#">
            Vendas
        </a>

        <a href="#">
            Logout
        </a>

    </nav>

</aside>

<!-- CONTEÚDO -->

<main class="conteudo">

    <!-- TOPO -->

    <div class="topo">

        <div>

            <h1>Cadastro de Usuários</h1>

            <p>
                Gerencie os usuários do sistema
            </p>

        </div>

        <button id="abrirModal" class="btn-novo">
            + Novo Usuário
        </button>

    </div>

    <!-- LISTA DE USUÁRIOS -->

    <section class="usuarios" id="tabelaUsuarios">

        <div class="usuario-card">

            <div class="usuario-info">

                <h3>Administrador</h3>

                <p>
                    <strong>Email:</strong>
                    admin@email.com
                </p>

                <p>
                    <strong>Role:</strong>
                    ADMIN
                </p>

                <span class="status">
                    Ativo
                </span>

            </div>

            <div class="acoes">

                <button class="editar">
                    Editar
                </button>

                <button class="desativar">
                    Desativar
                </button>

            </div>

        </div>

    </section>

</main>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-content">

        <div class="modal-topo">

            <h2>Novo Usuário</h2>

            <button id="fecharModal">
                X
            </button>

        </div>

        <form id="formUsuario">

            <div class="grupo">

                <label>Nome</label>

                <input type="text" id="nome" required>

            </div>

            <div class="grupo">

                <label>Email</label>

                <input type="email" id="email" required>

            </div>

            <div class="grupo">

                <label>Senha</label>

                <input type="password" id="senha" required>

            </div>

            <div class="grupo">

                <label>Role</label>

                <select id="role">

                    <option>ADMIN</option>

                    <option>FUNCIONARIO</option>

                </select>

            </div>

            <button type="submit" class="btn-salvar">
                Salvar Usuário
            </button>

        </form>

    </div>

</div>

<!-- JS -->
<script src="/app/static/JS/admin_usuarios.js"></script>


</body>
<html>
